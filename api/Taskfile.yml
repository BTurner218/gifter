version: '3'

env:
  POSTGRESQL_URL: postgres://postgres:example@localhost:5432/gifter?sslmode=disable

tasks:
  run:
    cmds:
      - go run main.go

  create-migration:
    cmds:
      - migrate create -ext sql -dir db/migrations -seq {{.CLI_ARGS}}

  run-migration:
    cmds:
      - migrate -database $POSTGRESQL_URL -path db/migrations up

  down-migration:
    cmds:
      - migrate -database $POSTGRESQL_URL -path db/migrations down

  force-migration:
    cmds:
      - migrate -database $POSTGRESQL_URL -path postgres/migrations force {{.CLI_ARGS}}
